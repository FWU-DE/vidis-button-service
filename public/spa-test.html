<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>SPA Mount/Unmount Test</title>
  <script src="./vidisLogin.umd.js"></script>
  <link rel="stylesheet" href="./vidisLogin.css">
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    button { padding: 10px 20px; margin: 10px; font-size: 16px; cursor: pointer; }
    #container { margin-top: 20px; border: 2px solid #ccc; padding: 20px; min-height: 200px; }
    .success { color: green; font-weight: bold; }
    .error { color: red; font-weight: bold; }
    #log { margin-top: 20px; padding: 10px; background: #f5f5f5; font-family: monospace; }
  </style>
</head>
<body>
  <h1>VIDIS Button SPA Test</h1>
  <p>Simuliert das Verhalten einer React SPA mit Routing</p>
  
  <button onclick="mount()">🟢 Mount Button (Login-Seite)</button>
  <button onclick="unmount()">🔴 Unmount Button (andere Seite)</button>
  <button onclick="testMultipleMounts()">🔄 Test 5x Mount/Unmount</button>
  <button onclick="clearLog()">🗑️ Log leeren</button>
  
  <div id="status"></div>
  <div id="container"></div>
  <div id="log"></div>

  <script>
    let mountCount = 0;
    let errorCount = 0;

    function log(message, isError = false) {
      const logDiv = document.getElementById('log');
      const timestamp = new Date().toLocaleTimeString();
      const className = isError ? 'error' : 'success';
      logDiv.innerHTML += `<div class="${className}">[${timestamp}] ${message}</div>`;
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    function clearLog() {
      document.getElementById('log').innerHTML = '';
      mountCount = 0;
      errorCount = 0;
      updateStatus();
    }

    function updateStatus() {
      const status = document.getElementById('status');
      status.innerHTML = `<p>Mounts: ${mountCount} | Fehler: ${errorCount}</p>`;
    }

    function mount() {
      const container = document.getElementById('container');
      
      // Simulate React mounting the component
      const vidisLogin = document.createElement('vidis-login');
      vidisLogin.setAttribute('loginurl', 'https://www.taskcards.de/auth/openid');
      vidisLogin.setAttribute('size', 'L');
      
      try {
        container.appendChild(vidisLogin);
        mountCount++;
        log(`✅ Mount #${mountCount} erfolgreich`);
        updateStatus();
      } catch (error) {
        errorCount++;
        log(`❌ Fehler beim Mount #${mountCount + 1}: ${error.message}`, true);
        updateStatus();
      }
    }

    function unmount() {
      const container = document.getElementById('container');
      
      // Simulate React unmounting the component
      container.innerHTML = '';
      log(`🗑️ Unmount durchgeführt`);
    }

    function testMultipleMounts() {
      clearLog();
      log('🔄 Starte automatischen Test...');
      
      let cycle = 0;
      const interval = setInterval(() => {
        if (cycle >= 5) {
          clearInterval(interval);
          log(`✅ Test abgeschlossen: ${mountCount} Mounts, ${errorCount} Fehler`);
          if (errorCount === 0) {
            log('🎉 ALLE TESTS BESTANDEN!', false);
          }
          return;
        }
        
        mount();
        setTimeout(() => {
          unmount();
          cycle++;
        }, 500);
      }, 1000);
    }

    // Capture errors in console
    const originalError = console.error;
    console.error = function(...args) {
      const message = args.join(' ');
      if (message.includes('already been defined')) {
        log(`❌ Console Error: ${message}`, true);
      }
      originalError.apply(console, args);
    };

    log('📋 Seite geladen. Bereit zum Testen.');
  </script>
</body>
</html>
